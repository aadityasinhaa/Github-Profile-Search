<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Search</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">

    <!-- Header with theme toggle -->
    <header class="header">
      <div class="logo">
        <svg height="32" viewBox="0 0 16 16" width="32" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <h1>GitHub Profile Search</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Search section -->
    <section class="search-section">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          placeholder="Enter GitHub username..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="searchBtn" class="search-btn">Search</button>
      </div>
      <!-- Recent searches -->
      <div id="recentSearches" class="recent-searches hidden"></div>
    </section>

    <!-- Loading spinner -->
    <div id="loader" class="loader hidden">
      <div class="spinner"></div>
      <p>Fetching profile...</p>
    </div>

    <!-- Error message -->
    <div id="errorMessage" class="error-message hidden"></div>

    <!-- Results container -->
    <main id="resultsContainer" class="results-container hidden">

      <!-- Profile card -->
      <section class="profile-card" id="profileCard">
        <div class="profile-header">
          <img id="avatar" src="" alt="User avatar" class="avatar" />
          <div class="profile-info">
            <h2 id="name" class="name"></h2>
            <a id="profileLink" href="" target="_blank" rel="noopener noreferrer" class="username-link"></a>
            <p id="bio" class="bio hidden"></p>
          </div>
        </div>
        <div class="profile-meta">
          <span id="company" class="meta-item hidden">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span></span>
          </span>
          <span id="location" class="meta-item hidden">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span></span>
          </span>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="followers">0</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="following">0</span>
            <span class="stat-label">Following</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="repos">0</span>
            <span class="stat-label">Repos</span>
          </div>
        </div>
      </section>

      <!-- Repositories section -->
      <section class="repos-section">
        <h3 class="section-title">Top Repositories</h3>
        <div id="reposGrid" class="repos-grid"></div>
      </section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
